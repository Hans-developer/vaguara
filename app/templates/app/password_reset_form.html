{% extends 'app/base.html' %}

{% block title %}Recuperar Contraseña · Vaguara{% endblock %}

{% block content %}
  <div class="mx-auto w-full max-w-md mt-10">
    <div class="rounded-[2.5rem] bg-white p-8 sm:p-10 shadow-2xl shadow-rose-200/20 ring-1 ring-rose-100/50">
      <h1 class="text-3xl font-black text-slate-900 tracking-tight">Recuperar acceso</h1>
      <p class="mt-2 text-slate-500 font-medium">Ingresa tu email para recibir un enlace de recuperación.</p>

      <form method="post" class="mt-6 space-y-4">
        {% csrf_token %}
        <div>
          <label class="text-xs font-bold uppercase tracking-wider text-slate-400 ml-1" for="id_email">Correo Electrónico</label>
          <input type="email" name="email" id="id_email" required class="mt-1">
        </div>

        <button class="w-full rounded-2xl bg-slate-900 py-3.5 font-bold text-white shadow-lg transition-all hover:bg-slate-800 flex items-center justify-center gap-2" type="submit">
          <i data-lucide="send" class="w-4 h-4"></i> Enviar enlace
        </button>
      </form>
    </div>
  </div>
{% endblock %}
