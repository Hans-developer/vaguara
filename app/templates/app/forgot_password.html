{% extends 'app/base.html' %}

{% block title %}Recuperar Acceso · Vaguara{% endblock %}

{% block content %}
  <div class="mx-auto w-full max-w-md mt-10">
    <div class="rounded-[2.5rem] bg-white p-8 sm:p-10 shadow-2xl shadow-rose-200/20 ring-1 ring-rose-100/50">
      <h1 class="text-3xl font-black text-slate-900 tracking-tight">Recuperar acceso</h1>
      <p class="mt-2 text-slate-500 font-medium">Ingresa el email de tu cuenta para recibir un código.</p>

      {% if error %}
        <div class="mt-6 rounded-2xl bg-rose-50 px-4 py-3 text-sm font-bold text-rose-600 flex items-center gap-2">
          <i data-lucide="alert-circle" class="w-4 h-4"></i> {{ error }}
        </div>
      {% endif %}

      <form method="post" class="mt-6 space-y-4">
        {% csrf_token %}
        <div>
          <label class="text-xs font-bold uppercase tracking-wider text-slate-400 ml-1">Correo Electrónico</label>
          <input type="email" name="email" required placeholder="tu@email.com">
        </div>
        <button class="w-full rounded-2xl bg-slate-900 py-3.5 font-bold text-white shadow-lg hover:bg-slate-800 transition-all flex items-center justify-center gap-2" type="submit">
          <i data-lucide="send" class="w-4 h-4"></i> Enviar código
        </button>
      </form>
    </div>
  </div>
{% endblock %}
