{% extends 'app/base.html' %}

{% block title %}Correo Enviado · Vaguara{% endblock %}

{% block content %}
  <div class="mx-auto w-full max-w-md mt-10 text-center">
    <div class="rounded-[2.5rem] bg-white p-10 shadow-2xl shadow-rose-200/20 ring-1 ring-rose-100/50">
      <div class="mx-auto w-16 h-16 bg-emerald-50 text-emerald-500 rounded-2xl flex items-center justify-center mb-6">
        <i data-lucide="mail-check" class="w-10 h-10"></i>
      </div>
      <h1 class="text-2xl font-black text-slate-900 tracking-tight">¡Correo enviado!</h1>
      <p class="mt-3 text-slate-600">Te hemos enviado instrucciones para restablecer tu contraseña. Si no lo recibes, revisa tu carpeta de spam.</p>
    </div>
  </div>
{% endblock %}
