{% extends 'app/base.html' %}

{% block title %}Verificar Código · Vaguara{% endblock %}

{% block content %}
  <div class="mx-auto w-full max-w-md mt-10">
    <div class="rounded-[2.5rem] bg-white p-8 sm:p-10 shadow-2xl shadow-rose-200/20 ring-1 ring-rose-100/50 text-center">
      <div class="mx-auto w-16 h-16 bg-rose-50 text-rose-500 rounded-2xl flex items-center justify-center mb-6">
        <i data-lucide="shield-check" class="w-10 h-10"></i>
      </div>
      <h1 class="text-2xl font-black text-slate-900 tracking-tight">Ingresa el código</h1>
      <p class="mt-2 text-slate-500 font-medium text-sm">Hemos enviado un código de 6 dígitos a tu correo.</p>

      {% if error %}
        <div class="mt-4 rounded-xl bg-rose-50 px-4 py-2 text-xs font-bold text-rose-600">
          {{ error }}
        </div>
      {% endif %}

      <form method="post" class="mt-6 space-y-4 text-left">
        {% csrf_token %}
        <input type="text" name="codigo" required placeholder="000000" class="text-center text-2xl tracking-[1em] font-black uppercase">
        
        <button class="w-full rounded-2xl bg-slate-900 py-3.5 font-bold text-white shadow-lg hover:bg-slate-800 transition-all flex items-center justify-center gap-2" type="submit">
          Verificar y entrar
        </button>
      </form>
    </div>
  </div>
{% endblock %}
